<!doctype html>
<!--
  EVC carousel — Slide 04 STAT (text left 60%, illustration right 40%)
  Placeholders:
    {{ILLUS_IMG}}      — 430×1350 narrow portrait (generate at 9:16)
    {{STAT_NUMBER}}    · {{STAT_UNIT}}
    {{STAT_LABEL_1}}   · {{STAT_LABEL_2}}
    {{PAGE_CURRENT}}   · {{PAGE_TOTAL}}
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="shared.css">
  <title>EVC Slide — Stat</title>
</head>
<body>
<section class="slide split-stat">
  <div class="zone-text">
    <div class="stack" style="gap: 48px; padding-top: 200px; max-width: 560px;">
      <div class="t-stat-num" style="font-size: 300px;">
        {{STAT_NUMBER}}<span class="unit">{{STAT_UNIT}}</span>
      </div>
      <div class="t-stat-label" style="font-size: 46px;">
        {{STAT_LABEL_1}}<br>{{STAT_LABEL_2}}
      </div>
    </div>
  </div>
  <div class="zone-illus">
    <img src="{{ILLUS_IMG}}" alt="">
  </div>
  <div class="page-pill" style="z-index: 3;">{{PAGE_CURRENT}}<span class="sep">/</span>{{PAGE_TOTAL}}</div>
</section>
</body>
</html>
