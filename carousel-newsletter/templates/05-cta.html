<!doctype html>
<!--
  EVC carousel — Slide 05 CTA (text left 60%, illustration right 40%)
  Placeholders:
    {{ILLUS_IMG}}      — 440×1350 narrow portrait (generate at 9:16)
    {{HEADLINE_1}}     — "Want the full article?"
    {{ACCENT_WORD}}    — "newsletter" (must match Comment-to-DM trigger)
    {{BODY}}
    {{PAGE_CURRENT}}   · {{PAGE_TOTAL}}
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="shared.css">
  <title>EVC Slide — CTA</title>
</head>
<body>
<section class="slide split-cta">
  <div class="zone-text">
    <div class="stack" style="gap: 40px; padding-top: 140px; max-width: 580px;">
      <span class="t-kicker">GET THE FULL DEAL</span>
      <h2 class="t-headline" style="font-size: 90px;">
        {{HEADLINE_1}}
      </h2>
      <p class="t-quote" style="font-size: 82px; font-weight: 900;">
        Comment <span style="color: var(--evc-green);">&ldquo;{{ACCENT_WORD}}&rdquo;</span>
      </p>
      <p class="t-body" style="max-width: 560px; font-weight: 600;">
        {{BODY}}
      </p>
    </div>
  </div>
  <div class="zone-illus">
    <img src="{{ILLUS_IMG}}" alt="">
  </div>
  <div class="page-pill" style="z-index: 3;">{{PAGE_CURRENT}}<span class="sep">/</span>{{PAGE_TOTAL}}</div>
</section>
</body>
</html>
