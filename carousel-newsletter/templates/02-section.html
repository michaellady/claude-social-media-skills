<!doctype html>
<!--
  EVC carousel — Slide 02 SECTION (headline + short body, use for stage-setters, transitions, summaries)
  Placeholders:
    {{KICKER}}         — short uppercase label above headline (e.g., "THE REAL PROBLEM")
    {{HEADLINE_1}}     — first line of navy headline
    {{HEADLINE_ACCENT}}— accented (green) word/phrase, inline with headline
    {{BODY}}           — 2-3 short sentences elaborating, max ~220 chars
    {{PAGE_CURRENT}}   — e.g., "2"
    {{PAGE_TOTAL}}     — "10"
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="shared.css">
  <title>EVC Slide — Section</title>
</head>
<body>
<!--SVG_SPRITE-->
<section class="slide">
  <div class="stack" style="gap: 48px; padding-top: 60px; max-width: 920px;">
    <span class="t-kicker">{{KICKER}}</span>
    <h2 class="t-headline">
      {{HEADLINE_1}}
      <span class="accent">{{HEADLINE_ACCENT}}</span>
    </h2>
    <p class="t-body" style="max-width: 880px;">
      {{BODY}}
    </p>
  </div>

  <!-- Gear accent, top-right -->
  <svg class="illus top-right" width="220" height="220" aria-hidden="true">
    <use href="#gear" width="200" height="200" x="10" y="10"/>
  </svg>

  <!-- Rail + brick stack, bottom-right corner -->
  <svg class="illus bottom-right" width="560" height="260" aria-hidden="true">
    <use href="#rail" x="0" y="180" width="560" height="80"/>
    <use href="#brick-stack" x="340" y="0" width="220" height="200"/>
  </svg>

  <div class="page-pill">{{PAGE_CURRENT}}<span class="sep">/</span>{{PAGE_TOTAL}}</div>
  <svg class="mark" aria-hidden="true"><use href="#mark-evc" /></svg>
</section>
</body>
</html>
