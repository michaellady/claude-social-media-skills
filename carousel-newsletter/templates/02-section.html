<!doctype html>
<!--
  EVC carousel — Slide 02 SECTION (text left 65%, illustration right 35%)
  Placeholders:
    {{ILLUS_IMG}}       — 380×1350 narrow portrait scene (generate at 9:16)
    {{KICKER}}          · {{HEADLINE_1}} + {{HEADLINE_ACCENT}}
    {{BODY}}
    {{PAGE_CURRENT}}    · {{PAGE_TOTAL}}
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="shared.css">
  <title>EVC Slide — Section</title>
</head>
<body>
<section class="slide split-section">
  <div class="zone-text">
    <div class="stack" style="gap: 48px; padding-top: 80px; max-width: 560px;">
      <span class="t-kicker">{{KICKER}}</span>
      <h2 class="t-headline" style="font-size: 92px;">
        {{HEADLINE_1}}
        <span class="accent">{{HEADLINE_ACCENT}}</span>
      </h2>
      <p class="t-body" style="max-width: 540px; font-weight: 600;">
        {{BODY}}
      </p>
    </div>
  </div>
  <div class="zone-illus">
    <img src="{{ILLUS_IMG}}" alt="">
  </div>
  <div class="page-pill" style="z-index: 3;">{{PAGE_CURRENT}}<span class="sep">/</span>{{PAGE_TOTAL}}</div>
</section>
</body>
</html>
