<!doctype html>
<!--
  EVC carousel — Slide 01 HOOK (text top 40%, illustration bottom 60%)
  Placeholders:
    {{ILLUS_IMG}}      — 1080×810 scene (generate at aspect 4:3)
    {{LINE_1}}         · {{LINE_2}}
    {{TEASE}}
    {{PAGE_CURRENT}}   · {{PAGE_TOTAL}}
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="shared.css">
  <title>EVC Slide 01 — Hook</title>
</head>
<body>
<section class="slide split-hook">
  <div class="zone-text">
    <div class="stack" style="gap: 24px; padding-top: 10px;">
      <h1 class="t-hook" style="font-size: 132px;">
        {{LINE_1}}
        <span class="accent">{{LINE_2}}</span>
      </h1>
      <p class="t-body" style="max-width: 900px; font-weight: 700; color: var(--evc-navy-ink);">
        {{TEASE}}
      </p>
    </div>
  </div>
  <div class="zone-illus">
    <img src="{{ILLUS_IMG}}" alt="">
  </div>
  <div class="swipe-arrow" style="z-index: 3;">
    SWIPE
    <span style="display: inline-block; font-size: 38px; transform: translateY(-1px);">→</span>
  </div>
  <div class="page-pill" style="z-index: 3;">{{PAGE_CURRENT}}<span class="sep">/</span>{{PAGE_TOTAL}}</div>
</section>
</body>
</html>
