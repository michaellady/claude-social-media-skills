<!doctype html>
<!--
  EVC carousel — Slide 03 QUOTE (text top 80%, small illustration strip bottom 20%)
  Placeholders:
    {{ILLUS_IMG}}      — 1080×270 wide-strip scene (generate at 16:9, will be cropped)
    {{QUOTE}}          — verbatim
    {{ATTRIBUTION}}    — "<Article Title> — Enterprise Vibe Code"
    {{PAGE_CURRENT}}   · {{PAGE_TOTAL}}
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="shared.css">
  <title>EVC Slide — Quote</title>
</head>
<body>
<section class="slide split-quote">
  <div class="zone-text">
    <!-- Oversized green opening quote mark -->
    <div style="position:absolute; left: 80px; top: 80px; font-family: var(--font-display); font-weight: 900; font-size: 280px; line-height: 0.7; color: var(--evc-green); letter-spacing: -0.1em;">&ldquo;</div>
    <div class="stack" style="gap: 40px; padding-top: 280px; max-width: 920px;">
      <blockquote class="t-quote" style="font-weight: 800; color: var(--evc-navy-ink);">{{QUOTE}}</blockquote>
      <div class="t-attr">— {{ATTRIBUTION}}</div>
    </div>
  </div>
  <div class="zone-illus">
    <img src="{{ILLUS_IMG}}" alt="">
  </div>
  <div class="page-pill" style="z-index: 3; bottom: 150px;">{{PAGE_CURRENT}}<span class="sep">/</span>{{PAGE_TOTAL}}</div>
</section>
</body>
</html>
