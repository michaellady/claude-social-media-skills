<!--
  EVC illustration sprite sheet.
  Templates reference primitives via <use href="./illustrations.svg#symbol-id" />.
  All primitives share the same flat, outlined, isometric lego-construction language.
  Colors are baked into fills but every outline uses `currentColor` so templates can tint.
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none" color="#1B2A3D">

  <!-- EVC triangular watermark (same footprint as the banner bottom-right mark) -->
  <symbol id="mark-evc" viewBox="0 0 52 52">
    <path d="M26 4 L48 44 H4 Z" fill="#14386B" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
    <path d="M26 18 L38 38 H14 Z" fill="#F5ECD7"/>
  </symbol>

  <!-- Single gear, used in corners / backgrounds -->
  <symbol id="gear" viewBox="0 0 140 140">
    <g fill="#8894A3" stroke="currentColor" stroke-width="4" stroke-linejoin="round">
      <path d="M70 8 l10 18 18-6 0 20 18 10 -10 18 6 18 -20 0 -10 18 -18 -10 -18 6 0 -20 -18 -10 10 -18 -6 -18 20 0 10 -18 18 10z"/>
      <circle cx="70" cy="70" r="22" fill="#F5ECD7"/>
      <circle cx="70" cy="70" r="8" fill="#14386B" stroke="none"/>
    </g>
  </symbol>

  <!-- Small gear accent -->
  <symbol id="gear-sm" viewBox="0 0 80 80">
    <g fill="#4A5663" stroke="currentColor" stroke-width="3" stroke-linejoin="round">
      <path d="M40 4 l6 10 10 -4 0 12 10 6 -6 10 4 10 -12 0 -6 10 -10 -6 -10 4 0 -12 -10 -6 6 -10 -4 -10 12 0 6 -10z"/>
      <circle cx="40" cy="40" r="12" fill="#F5ECD7"/>
    </g>
  </symbol>

  <!-- Wrench -->
  <symbol id="wrench" viewBox="0 0 220 80">
    <path d="M18 40 a22 22 0 0 1 22 -22 h4 l-6 12 6 12 -10 6 -12 0 z M44 28 h160 v24 h-160 z M204 18 h12 v44 h-12 z"
      fill="#8894A3" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
  </symbol>

  <!-- Minecart with lego load (hero illustration, same silhouette as banner) -->
  <symbol id="minecart" viewBox="0 0 360 240">
    <!-- cart body -->
    <path d="M30 120 h300 l-24 80 h-252 z" fill="#8894A3" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
    <rect x="50" y="130" width="260" height="20" fill="#4A5663"/>
    <!-- wheels -->
    <circle cx="90" cy="208" r="22" fill="#4A5663" stroke="currentColor" stroke-width="5"/>
    <circle cx="270" cy="208" r="22" fill="#4A5663" stroke="currentColor" stroke-width="5"/>
    <circle cx="90" cy="208" r="6" fill="#F5ECD7"/>
    <circle cx="270" cy="208" r="6" fill="#F5ECD7"/>
    <!-- lego load -->
    <rect x="70" y="60" width="90" height="60" fill="#F2B705" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="92" cy="60" r="10" fill="#C79204" stroke="currentColor" stroke-width="4"/>
    <circle cx="138" cy="60" r="10" fill="#C79204" stroke="currentColor" stroke-width="4"/>
    <rect x="165" y="30" width="70" height="90" fill="#2E6CC4" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="182" cy="30" r="9" fill="#1F4F96" stroke="currentColor" stroke-width="4"/>
    <circle cx="218" cy="30" r="9" fill="#1F4F96" stroke="currentColor" stroke-width="4"/>
    <rect x="240" y="72" width="70" height="48" fill="#2D8A3E" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="258" cy="72" r="8" fill="#1E6A2C" stroke="currentColor" stroke-width="4"/>
    <circle cx="292" cy="72" r="8" fill="#1E6A2C" stroke="currentColor" stroke-width="4"/>
  </symbol>

  <!-- Rail track segment (horizontal) -->
  <symbol id="rail" viewBox="0 0 400 80">
    <rect x="0" y="18" width="400" height="10" fill="#4A5663" stroke="currentColor" stroke-width="3"/>
    <rect x="0" y="52" width="400" height="10" fill="#4A5663" stroke="currentColor" stroke-width="3"/>
    <g fill="#8B5A2B" stroke="currentColor" stroke-width="2">
      <rect x="18" y="10" width="28" height="60"/>
      <rect x="86" y="10" width="28" height="60"/>
      <rect x="154" y="10" width="28" height="60"/>
      <rect x="222" y="10" width="28" height="60"/>
      <rect x="290" y="10" width="28" height="60"/>
      <rect x="358" y="10" width="28" height="60"/>
    </g>
  </symbol>

  <!-- Stylized robot — white suit, blue visor, holding a wrench. Simplified silhouette of banner character. -->
  <symbol id="robot" viewBox="0 0 200 260">
    <!-- body -->
    <path d="M70 100 h60 q14 0 14 14 v100 q0 14 -14 14 h-60 q-14 0 -14 -14 v-100 q0 -14 14 -14 z"
      fill="#FFFFFF" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
    <!-- helmet -->
    <circle cx="100" cy="70" r="46" fill="#FFFFFF" stroke="currentColor" stroke-width="5"/>
    <!-- visor -->
    <path d="M68 64 q0 -18 32 -18 t32 18 v10 q0 10 -32 10 t-32 -10 z" fill="#2E6CC4" stroke="currentColor" stroke-width="4"/>
    <circle cx="86" cy="66" r="3" fill="#F5ECD7"/>
    <circle cx="114" cy="66" r="3" fill="#F5ECD7"/>
    <!-- tie / neckpiece -->
    <path d="M94 116 l6 10 6 -10 -2 24 -4 6 -4 -6 z" fill="#14386B" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
    <!-- arm + wrench -->
    <path d="M140 160 l40 16 -4 12 -40 -16 z" fill="#FFFFFF" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
    <path d="M176 174 a10 10 0 1 0 10 14 l-6 -2 2 -8 -6 -4 z" fill="#8894A3" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
    <!-- legs -->
    <rect x="74" y="228" width="22" height="26" fill="#FFFFFF" stroke="currentColor" stroke-width="4"/>
    <rect x="104" y="228" width="22" height="26" fill="#FFFFFF" stroke="currentColor" stroke-width="4"/>
  </symbol>

  <!-- Stacked bricks arrangement (for corner accents) -->
  <symbol id="brick-stack" viewBox="0 0 200 180">
    <!-- base yellow -->
    <rect x="10" y="110" width="180" height="60" rx="6" fill="#F2B705" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="44" cy="110" r="12" fill="#C79204" stroke="currentColor" stroke-width="4"/>
    <circle cx="100" cy="110" r="12" fill="#C79204" stroke="currentColor" stroke-width="4"/>
    <circle cx="156" cy="110" r="12" fill="#C79204" stroke="currentColor" stroke-width="4"/>
    <!-- mid blue -->
    <rect x="40" y="54" width="120" height="56" rx="6" fill="#2E6CC4" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="70" cy="54" r="11" fill="#1F4F96" stroke="currentColor" stroke-width="4"/>
    <circle cx="130" cy="54" r="11" fill="#1F4F96" stroke="currentColor" stroke-width="4"/>
    <!-- top green -->
    <rect x="66" y="6" width="68" height="48" rx="6" fill="#2D8A3E" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="100" cy="6" r="9" fill="#1E6A2C" stroke="currentColor" stroke-width="4"/>
  </symbol>

  <!-- Swipe/chevron arrow for CTA slide -->
  <symbol id="swipe-chevron" viewBox="0 0 120 60">
    <g fill="none" stroke="#14386B" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 30 l24 -20 24 20"/>
      <path d="M46 30 l24 -20 24 20" opacity="0.6"/>
      <path d="M82 30 l24 -20 14 12" opacity="0.35"/>
    </g>
  </symbol>

  <!-- Open quote glyph (alternative to the CSS " character for consistency) -->
  <symbol id="quote-open" viewBox="0 0 120 96">
    <path d="M10 86 V52 q0 -34 36 -42 v16 q-16 6 -16 26 h16 v34 z M68 86 V52 q0 -34 36 -42 v16 q-16 6 -16 26 h16 v34 z"
      fill="#2D8A3E"/>
  </symbol>

</svg>
